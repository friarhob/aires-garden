    <script>
    (function () {
      var langs = {{ SITE_LANGS | tojson }};
      var defaultLang = document.documentElement.dataset.defaultLang || '{{ DEFAULT_LANG }}';
      var path = window.location.pathname;
      var target;

      // Stage 1: /<lang>/ prefix in the requested path
      var m = path.match(/^\/([a-z]{2})\//);
      if (m && langs.indexOf(m[1]) !== -1) { target = m[1]; }

      // Stage 2: stored language preference (data-pref-lang set by inline loader)
      if (!target) {
        var pref = document.documentElement.dataset.prefLang;
        if (pref && langs.indexOf(pref) !== -1) { target = pref; }
      }

      // Stage 3: browser language preference
      if (!target) {
        var nav = ((navigator.language || navigator.userLanguage) || '').slice(0, 2).toLowerCase();
        if (nav && langs.indexOf(nav) !== -1) { target = nav; }
      }

      // Fallback: default language
      if (!target) { target = defaultLang; }

      document.documentElement.lang = target;
      var sections = document.querySelectorAll('section[data-lang]');
      for (var i = 0; i < sections.length; i++) {
        if (sections[i].dataset.lang !== target) { sections[i].hidden = true; }
      }
    }());
    </script>
