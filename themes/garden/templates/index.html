{% extends "base.html" %}
{% block title %}{{ SITENAME }}{% endblock %}
{% block content %}
    <h1>Posts</h1>
    <ul>
    {% for article in articles %}
        <li>
            <a href="{{ SITEURL }}/{{ article.url }}">{{ article.title }}</a>
            <time datetime="{{ article.date.isoformat() }}">{{ article.locale_date }}</time>
        </li>
    {% endfor %}
    </ul>
{% endblock %}
